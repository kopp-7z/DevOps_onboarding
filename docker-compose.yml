

services:

  db:
    image: postgres:16
    restart: always 
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: wikijs
    volumes:
      - db-data:/var/lib/postgresql/data 
    networks:
      wiki-net:
        ipv4_address: 172.20.0.10
    ports:                                                                                                                                                                                
    - "5432:5432"
  wiki:
    image: requarks/wiki:2
    depends_on: 
      - db
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_PASS: password
      DB_NAME: wikijs
    restart: unless-stopped
    ports:
      - "3000:3000"
      
    networks: 
      - wiki-net
  web:
    image: nginx
    depends_on:
      - wiki
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf  
    networks: 
      - wiki-net
volumes:
  db-data:
networks:
  wiki-net:
    ipam:
      config:
        - subnet: 172.20.0.0/24